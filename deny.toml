# cargo-deny supply-chain policy for sk-pqc.
# Run: cargo deny check          (all four: advisories, licenses, bans, sources)
# Schema: cargo-deny 0.19.x (config version 2). https://embarkstudios.github.io/cargo-deny/

[graph]
# Audit ALL features, incl. the optional `python` (pyo3) and `dart`
# (flutter_rust_bridge) bindings — they pull deps the default build does not.
all-features = true

[advisories]
# RustSec advisory DB. Default policy = DENY any crate with an open advisory.
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # NOTHING is silenced. Known-open as of 2026-06-28 (fix = bump pyo3 >= 0.29.0),
    # both reachable ONLY via the optional `python` feature, never the pure-Rust core:
    #   RUSTSEC-2026-0177  pyo3 missing Sync bound on PyCFunction::new_closure closures
    #   RUSTSEC-2025-0020  pyo3 buffer overflow in PyString::from_object
]

[licenses]
# Entire tree is permissive — no copyleft. Exact set present 2026-06-28:
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception", # target-lexicon (pyo3 build-dep); standard LLVM exception, permissive
    "MIT",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",  # unicode-ident
    "Unlicense",
]
confidence-threshold = 0.9

[bans]
# Several transitive crates ship two semver-major versions (thiserror 1/2,
# itertools 0.11/0.13, etc.) — informational, not a failure.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only crates.io is trusted. No git or alternate-registry sources permitted.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
