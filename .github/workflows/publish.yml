# Publish sk-pqc to crates.io via TRUSTED PUBLISHING (OIDC) — no token stored.
# One-time setup (Chef, browser, AFTER the crate name exists): crates.io → sk-pqc →
#   Settings → Trusted Publishing → add GitHub: owner smilinTux, repo sk-pqc,
#   workflow publish.yml, environment release.
# Then pushing a v* tag publishes. NOTE: the *first ever* publish must claim the name
# with a one-time token (cargo publish) — trusted publishing takes over after that.
name: Publish to crates.io
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
